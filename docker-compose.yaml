# Open OSCAR Server — build everything from this repo.
# Usage:
#   OSCAR_HOST=ras.dev docker compose up -d --build
#
# Optional one-shots (also built from local Dockerfiles):
#   OSCAR_HOST=ras.dev docker compose run --rm cert-gen
#   docker compose run --rm nss-gen
#
# Standalone client bots (tocbot, aibot, discord-bridge, irc-bridge) are opt-in
# via the "bots" profile; they do NOT start on a plain `docker compose up`:
#   docker compose --profile bots up -d --build

services:
  cert-gen:
    build:
      context: .
      dockerfile: Dockerfile.certgen
    image: ras-certgen:latest
    volumes:
      - ./certs:/work/certs
    working_dir: /work/certs
    environment:
      OSCAR_HOST: ${OSCAR_HOST:-localhost}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if [ -f server.pem ]; then
          echo "certs/server.pem already exists, skipping generation"
          exit 0
        fi
        echo "Generating self-signed cert for CN=$${OSCAR_HOST}"
        openssl req -x509 -newkey rsa:1024 \
          -keyout key.pem \
          -out cert.pem \
          -sha256 -days 365 -nodes \
          -subj "/CN=$${OSCAR_HOST}"
        cat cert.pem key.pem > server.pem
        rm -f cert.pem key.pem
        echo "Wrote server.pem"
    restart: "no"

  nss-gen:
    build:
      context: .
      dockerfile: Dockerfile.certgen
    image: ras-certgen:latest
    volumes:
      - ./certs:/work/certs
    working_dir: /work/certs
    depends_on:
      cert-gen:
        condition: service_completed_successfully
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if [ ! -f server.pem ]; then
          echo "certs/server.pem missing; run cert-gen first" >&2
          exit 1
        fi
        if [ -d nss ] && { [ -f nss/cert8.db ] || [ -f nss/cert9.db ]; }; then
          echo "certs/nss already exists, skipping generation"
          exit 0
        fi
        rm -rf nss
        mkdir -p nss
        certutil -N -d nss --empty-password
        certutil -A -n "RAS" -t "CT,,C" -i server.pem -d nss
        echo "Wrote certs/nss/"
    restart: "no"
    profiles: ["nss"]

  open-oscar-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: ras:latest
    depends_on:
      cert-gen:
        condition: service_completed_successfully
    ports:
      - "5190:5190"
      - "8080:8080"
      - "9898:9898"
      - "1088:1088"
      - "4000:4000/udp"
    environment:
      # Compose overrides win over values in the config file (godotenv does not override).
      API_LISTENER: "0.0.0.0:8080"
      DB_PATH: "/data/oscar.sqlite"
      OSCAR_ADVERTISED_LISTENERS_SSL: "LOCAL://${OSCAR_HOST:-localhost}:5193"
    volumes:
      - oscar-data:/data
      - ./config:/config:ro
    command: ["/app/open_oscar_server", "-config", "/config/ssl/settings.env"]
    restart: unless-stopped

  stunnel:
    build:
      context: .
      dockerfile: Dockerfile.stunnel
    image: ras-stunnel:5.76-openssl-1.0.2u
    depends_on:
      cert-gen:
        condition: service_completed_successfully
      open-oscar-server:
        condition: service_started
    ports:
      - "443:443"
      - "5193:5193"
    volumes:
      - ./config/ssl/stunnel.conf:/etc/stunnel/stunnel.conf:ro
      - ./certs:/etc/stunnel/certs:ro
    command: ["stunnel.conf"]
    restart: unless-stopped

  # Operator console (SPA + nginx API proxy)
  # UI: http://localhost:3000  |  /api -> open-oscar-server:8080
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: ras-console:latest
    depends_on:
      - open-oscar-server
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ------------------------------------------------------------------
  # Standalone client bots.
  #
  # These are TOC/AIM clients that dial OUT to open-oscar-server (or an
  # external network). They publish no host ports and are gated behind the
  # "bots" Compose profile so a plain `docker compose up` is unaffected.
  #
  # Start them with:
  #   docker compose --profile bots up -d --build
  # ------------------------------------------------------------------

  # Minimal echo/time/ping TOC bot.
  tocbot:
    profiles: ["bots"]
    build:
      context: .
      dockerfile: Dockerfile.clients
      args:
        TARGET: tocbot
    image: ras-tocbot:latest
    depends_on:
      - open-oscar-server
    environment:
      TOCBOT_SERVER: ${TOCBOT_SERVER:-open-oscar-server:9898}
      TOCBOT_SCREENNAME: ${TOCBOT_SCREENNAME:-}
      TOCBOT_PASSWORD: ${TOCBOT_PASSWORD:-}
      TOCBOT_AWAY: ${TOCBOT_AWAY:-}
    restart: unless-stopped

  # LLM-backed AIM bot (OpenAI-compatible API).
  aibot:
    profiles: ["bots"]
    build:
      context: .
      dockerfile: Dockerfile.clients
      args:
        TARGET: aibot
    image: ras-aibot:latest
    depends_on:
      - open-oscar-server
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      AIBOT_SYSTEM_PROMPT: ${AIBOT_SYSTEM_PROMPT:-}
      AIBOT_HISTORY_LIMIT: ${AIBOT_HISTORY_LIMIT:-8}
      TOCBOT_SERVER: ${TOCBOT_SERVER:-open-oscar-server:9898}
      TOCBOT_SCREENNAME: ${TOCBOT_SCREENNAME:-}
      TOCBOT_PASSWORD: ${TOCBOT_PASSWORD:-}
    restart: unless-stopped

  # Discord <-> AIM bridge.
  discord-bridge:
    profiles: ["bots"]
    build:
      context: .
      dockerfile: Dockerfile.clients
      args:
        TARGET: discord-bridge
    image: ras-discord-bridge:latest
    depends_on:
      - open-oscar-server
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      DISCORD_CHANNEL_ID: ${DISCORD_CHANNEL_ID:-}
      AIM_TO: ${AIM_TO:-}
      BRIDGE_TRIGGER: ${BRIDGE_TRIGGER:-}
      TOCBOT_SERVER: ${TOCBOT_SERVER:-open-oscar-server:9898}
      TOCBOT_SCREENNAME: ${TOCBOT_SCREENNAME:-}
      TOCBOT_PASSWORD: ${TOCBOT_PASSWORD:-}
    restart: unless-stopped

  # IRC <-> AIM bridge.
  irc-bridge:
    profiles: ["bots"]
    build:
      context: .
      dockerfile: Dockerfile.clients
      args:
        TARGET: irc-bridge
    image: ras-irc-bridge:latest
    depends_on:
      - open-oscar-server
    environment:
      IRC_SERVER: ${IRC_SERVER:-}
      IRC_PORT: ${IRC_PORT:-6667}
      IRC_TLS: ${IRC_TLS:-false}
      IRC_NICK: ${IRC_NICK:-}
      IRC_CHANNEL: ${IRC_CHANNEL:-}
      AIM_TO: ${AIM_TO:-}
      TOCBOT_SERVER: ${TOCBOT_SERVER:-open-oscar-server:9898}
      TOCBOT_SCREENNAME: ${TOCBOT_SCREENNAME:-}
      TOCBOT_PASSWORD: ${TOCBOT_PASSWORD:-}
    restart: unless-stopped

volumes:
  oscar-data: